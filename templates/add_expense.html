{% extends "base.html" %}

{% block title %}{% if mode == 'edit' %}Edit{% else %}Add{% endif %} Expense - Expense Manager{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="bi bi-plus-circle"></i> {% if mode == 'edit' %}Edit Expense{% else %}Add New Expense{% endif %}
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{% if mode == 'edit' %}{{ url_for('expenses.edit_expense', expense_id=expense.id) }}{% else %}{{ url_for('expenses.add_expense') }}{% endif %}">
                        <div class="mb-3">
                            <label for="amount" class="form-label">Amount <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" class="form-control" id="amount" name="amount" step="0.01" min="0" required 
                                       value="{% if mode == 'edit' %}{{ expense.amount }}{% endif %}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="">-- Select Category --</option>
                                {% for cat in categories %}
                                <option value="{{ cat }}" {% if mode == 'edit' and expense.category == cat %}selected{% endif %}>{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3"
                                      placeholder="Enter expense description...">{% if mode == 'edit' %}{{ expense.description }}{% endif %}</textarea>
                        </div>

                        <div class="mb-3">
                            <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="date" name="date" required 
                                   value="{% if mode == 'edit' %}{{ expense.date }}{% else %}{{ today }}{% endif %}">
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('expenses.view_expenses') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> {% if mode == 'edit' %}Update{% else %}Add{% endif %} Expense
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
